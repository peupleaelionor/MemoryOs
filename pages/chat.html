<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coach IA – MemoryOS</title>
  <style>
    /* ── Variables et reset global ── */
    :root {
      --gold: #f0a500;
      --gold-light: #ffd166;
      --dark: #0d0d1a;
      --dark2: #13132b;
      --dark3: #1e1e3f;
      --purple: #6c3fc5;
      --purple-light: #8b5cf6;
      --text: #e8e8f0;
      --text-muted: #9090b0;
      --radius: 14px;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--dark);
      color: var(--text);
    }

    /* ── Conteneur principal en colonne pleine hauteur ── */
    .chat-page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }

    /* ── En-tête ── */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--dark2);
      border-bottom: 1px solid var(--dark3);
      flex-shrink: 0;
    }

    .back-btn {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      white-space: nowrap;
      transition: color 0.2s;
    }

    .back-btn:hover {
      color: var(--gold);
    }

    /* Avatar du coach */
    .coach-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--purple);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      flex-shrink: 0;
    }

    .coach-info {
      flex: 1;
      min-width: 0;
    }

    .coach-name {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Indicateur "En ligne" */
    .coach-status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }

    /* Badge "Propulsé par Claude" */
    .badge-claude {
      font-size: 0.65rem;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--dark3);
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Bouton vider l'historique */
    .clear-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      border-radius: 8px;
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }

    .clear-btn:hover {
      background: var(--dark3);
      color: #ef4444;
    }

    /* ── Zone des messages (défilable) ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Scrollbar personnalisée */
    .chat-messages::-webkit-scrollbar {
      width: 6px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: var(--dark3);
      border-radius: 3px;
    }

    /* ── Bulle de message ── */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Messages IA à gauche */
    .msg--ai {
      align-self: flex-start;
    }

    /* Messages utilisateur à droite */
    .msg--user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg--ai .msg-avatar {
      background: var(--purple);
    }

    .msg--user .msg-avatar {
      background: var(--gold);
      color: var(--dark);
    }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      line-height: 1.55;
      font-size: 0.92rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg--ai .msg-bubble {
      background: var(--dark2);
      border: 1px solid var(--dark3);
      border-top-left-radius: 4px;
    }

    .msg--user .msg-bubble {
      background: var(--purple);
      border-top-right-radius: 4px;
    }

    /* Horodatage sous la bulle */
    .msg-time {
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    .msg--user .msg-time {
      text-align: right;
    }

    /* ── Indicateur de frappe ── */
    .typing-indicator {
      display: none;
      align-self: flex-start;
      align-items: center;
      gap: 10px;
      max-width: 85%;
      padding: 4px 0;
    }

    .typing-indicator.visible {
      display: flex;
    }

    .typing-bubble {
      background: var(--dark2);
      border: 1px solid var(--dark3);
      border-radius: var(--radius);
      border-top-left-radius: 4px;
      padding: 10px 14px;
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Points animés */
    .typing-dots {
      display: inline-flex;
      gap: 3px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Suggestions rapides ── */
    .suggestions {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      overflow-x: auto;
      flex-shrink: 0;
      -webkit-overflow-scrolling: touch;
    }

    /* Masquer la scrollbar horizontale */
    .suggestions::-webkit-scrollbar { display: none; }
    .suggestions { -ms-overflow-style: none; scrollbar-width: none; }

    .chip {
      flex-shrink: 0;
      padding: 8px 14px;
      border-radius: 20px;
      background: var(--dark2);
      border: 1px solid var(--dark3);
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      white-space: nowrap;
    }

    .chip:hover {
      background: var(--dark3);
      border-color: var(--purple-light);
    }

    /* ── Barre de saisie ── */
    .input-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--dark2);
      border-top: 1px solid var(--dark3);
      flex-shrink: 0;
    }

    .input-bar input {
      flex: 1;
      padding: 12px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--dark3);
      background: var(--dark);
      color: var(--text);
      font-size: 0.92rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-bar input::placeholder {
      color: var(--text-muted);
    }

    .input-bar input:focus {
      border-color: var(--purple-light);
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--purple);
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .send-btn:hover {
      background: var(--purple-light);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── Message d'erreur dans le chat ── */
    .msg--error .msg-bubble {
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    /* ── Dialogue de confirmation ── */
    .confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .confirm-overlay.visible {
      display: flex;
    }

    .confirm-box {
      background: var(--dark2);
      border: 1px solid var(--dark3);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 340px;
      width: 90%;
      text-align: center;
    }

    .confirm-box h3 {
      margin-bottom: 8px;
      font-size: 1rem;
    }

    .confirm-box p {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .confirm-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .confirm-actions button {
      padding: 8px 20px;
      border-radius: 8px;
      border: none;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
    }

    .btn-cancel {
      background: var(--dark3);
      color: var(--text);
    }

    .btn-confirm {
      background: #ef4444;
      color: #fff;
    }

    .confirm-actions button:hover {
      opacity: 0.85;
    }

    /* ── Responsif – écrans plus larges ── */
    @media (min-width: 640px) {
      .msg { max-width: 65%; }
      .typing-indicator { max-width: 65%; }
    }

    @media (min-width: 1024px) {
      .chat-page {
        max-width: 800px;
        margin: 0 auto;
        border-left: 1px solid var(--dark3);
        border-right: 1px solid var(--dark3);
      }
    }
  </style>
</head>
<body>

  <!-- Dialogue de confirmation pour vider l'historique -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <h3>Effacer la conversation ?</h3>
      <p>Tout l'historique de messages sera supprimé. Cette action est irréversible.</p>
      <div class="confirm-actions">
        <button class="btn-cancel" id="btnCancel">Annuler</button>
        <button class="btn-confirm" id="btnConfirm">Supprimer</button>
      </div>
    </div>
  </div>

  <div class="chat-page">

    <!-- En-tête -->
    <header class="chat-header">
      <a href="/pages/dashboard.html" class="back-btn">← Dashboard</a>
      <div class="coach-avatar">🧠</div>
      <div class="coach-info">
        <div class="coach-name">Coach MemoryOS</div>
        <div class="coach-status">
          <span class="status-dot"></span>
          En ligne
        </div>
      </div>
      <span class="badge-claude">Propulsé par Claude</span>
      <button class="clear-btn" id="clearBtn" title="Effacer l'historique">🗑️</button>
    </header>

    <!-- Zone des messages -->
    <div class="chat-messages" id="chatMessages">
      <!-- Les messages sont injectés par JS -->

      <!-- Indicateur de frappe -->
      <div class="typing-indicator" id="typingIndicator">
        <div class="msg-avatar" style="background:var(--purple);">🧠</div>
        <div class="typing-bubble">
          MemoryOS est en train d'écrire
          <span class="typing-dots"><span></span><span></span><span></span></span>
        </div>
      </div>
    </div>

    <!-- Suggestions rapides -->
    <div class="suggestions" id="suggestions">
      <button class="chip">Comment améliorer ma mémoire ?</button>
      <button class="chip">Exercice de palais de mémoire</button>
      <button class="chip">C'est quoi la répétition espacée ?</button>
      <button class="chip">Technique pour retenir les noms</button>
      <button class="chip">Routine mémoire de 15 minutes</button>
    </div>

    <!-- Barre de saisie -->
    <div class="input-bar">
      <input type="text" id="msgInput" placeholder="Pose ta question mémoire…" autocomplete="off">
      <button class="send-btn" id="sendBtn" title="Envoyer">→</button>
    </div>

  </div>

<script>
/* ──────────────────────────────────────────────
   Coach IA – logique complète du chat
   ────────────────────────────────────────────── */

(function () {
  'use strict';

  /* ── Références DOM ── */
  const chatMessages    = document.getElementById('chatMessages');
  const typingIndicator = document.getElementById('typingIndicator');
  const msgInput        = document.getElementById('msgInput');
  const sendBtn         = document.getElementById('sendBtn');
  const clearBtn        = document.getElementById('clearBtn');
  const confirmOverlay  = document.getElementById('confirmOverlay');
  const btnCancel       = document.getElementById('btnCancel');
  const btnConfirm      = document.getElementById('btnConfirm');
  const suggestionsBar  = document.getElementById('suggestions');

  /* ── Clés localStorage ── */
  const STORAGE_KEY    = 'memoryos_chat_history';
  const ACTIVITY_KEY   = 'memoryos_last_activity';

  /* ── Message d'accueil par défaut ── */
  const WELCOME_MSG = {
    role: 'ai',
    text: 'Bonjour ! 👋 Je suis ton coach mémoire IA. Pose-moi n\'importe quelle question sur la mémorisation, demande des exercices ou discute de tes progrès !',
    time: Date.now()
  };

  /* ── État interne ── */
  let history = [];
  let isSending = false;

  /* ── Réponses démo (mode hors-ligne quand l'API n'est pas disponible) ── */
  const DEMO_RESPONSES = [
    "🧠 **La répétition espacée** est l'une des techniques les plus puissantes ! Révise à J+1, J+7, J+30 et J+90 pour ancrer durablement l'information. Essaie avec une liste de 10 mots aujourd'hui !",
    "🏛️ **Le palais de mémoire** (méthode des loci) consiste à placer mentalement des informations dans un lieu que tu connais bien. Imagine ta maison : chaque pièce devient un « crochet » pour un souvenir. C'est la technique des champions de mémoire !",
    "💡 **Le chunking** consiste à regrouper les informations en blocs. Par exemple, le numéro 0612345678 devient 06-12-34-56-78. Ton cerveau retient mieux 5 groupes que 10 chiffres isolés.",
    "😴 **Le sommeil est crucial** pour la mémoire ! Pendant le sommeil paradoxal (REM), ton cerveau consolide les souvenirs de la journée. Vise 7-9h de sommeil et évite les écrans 1h avant de dormir.",
    "🥑 **Nutrition et mémoire** : les Oméga-3 (poissons gras, noix) sont essentiels pour tes neurones. Les myrtilles, le curcuma et le chocolat noir sont aussi d'excellents alliés pour ta mémoire !",
    "🎯 **La technique Feynman** : pour vraiment comprendre et retenir un concept, explique-le comme si tu l'enseignais à un enfant de 10 ans. Si tu bloques, c'est que tu dois approfondir ce point.",
    "✨ **Les mnémoniques** sont des aide-mémoire créatifs. Par exemple, pour retenir l'ordre des planètes : « Mon Vieux Tu M'as Jeté Sur Une Nouvelle Planète » (Mercure, Vénus, Terre, Mars, Jupiter, Saturne, Uranus, Neptune, Pluton).",
    "🧩 **Le mind mapping** active les deux hémisphères du cerveau. Place le concept central au milieu, puis crée des branches avec des mots-clés et des images. C'est 3× plus efficace que la prise de notes linéaire !",
    "⏱️ **15 minutes par jour** d'entraînement ciblé suffisent pour améliorer significativement ta mémoire en 30 jours. La régularité est plus importante que la durée !",
    "🔥 **L'effet de testing** : se tester régulièrement est plus efficace que relire ses notes. C'est exactement ce que fait notre quiz ! Chaque test renforce la trace mnésique.",
    "🎵 **L'association sensorielle** : associe ce que tu apprends à une mélodie, une odeur ou une émotion. L'odorat est le sens le plus directement lié à la mémoire (via le système limbique).",
    "📝 **L'écriture manuscrite** active plus de zones cérébrales que le clavier. Pour les informations importantes, écris-les à la main au moins une fois !"
  ];
  let demoIndex = 0;

  /** Génère une réponse démo locale quand l'API n'est pas disponible */
  function getDemoResponse(userMessage) {
    var msg = userMessage.toLowerCase();

    // Réponses contextuelles basiques
    if (msg.includes('répétition') || msg.includes('espacé') || msg.includes('révision')) {
      return DEMO_RESPONSES[0];
    }
    if (msg.includes('palais') || msg.includes('loci') || msg.includes('lieu')) {
      return DEMO_RESPONSES[1];
    }
    if (msg.includes('chunk') || msg.includes('group') || msg.includes('bloc')) {
      return DEMO_RESPONSES[2];
    }
    if (msg.includes('sommeil') || msg.includes('dormir') || msg.includes('nuit')) {
      return DEMO_RESPONSES[3];
    }
    if (msg.includes('nutrition') || msg.includes('aliment') || msg.includes('manger') || msg.includes('omega')) {
      return DEMO_RESPONSES[4];
    }
    if (msg.includes('feynman') || msg.includes('enseign') || msg.includes('expliqu')) {
      return DEMO_RESPONSES[5];
    }
    if (msg.includes('mnémo') || msg.includes('acronyme') || msg.includes('astuce')) {
      return DEMO_RESPONSES[6];
    }
    if (msg.includes('mind map') || msg.includes('carte mentale') || msg.includes('schéma')) {
      return DEMO_RESPONSES[7];
    }

    // Réponse tournante pour les autres messages
    var response = DEMO_RESPONSES[demoIndex % DEMO_RESPONSES.length];
    demoIndex++;
    return response;
  }

  /* ─────────── Fonctions utilitaires ─────────── */

  /** Formater un timestamp en heure locale courte */
  function formatTime(ts) {
    return new Date(ts).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  }

  /** Échapper le HTML pour éviter les injections XSS */
  function escapeHTML(str) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(str));
    return d.innerHTML;
  }

  /** Mettre à jour la dernière activité */
  function updateActivity() {
    try {
      localStorage.setItem(ACTIVITY_KEY, JSON.stringify({
        page: '/pages/chat.html',
        label: 'Coach IA',
        timestamp: Date.now()
      }));
    } catch (_) { /* quota dépassé – on ignore */ }
  }

  /** Sauvegarder l'historique dans localStorage */
  function saveHistory() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    } catch (_) { /* quota dépassé – on ignore */ }
    updateActivity();
  }

  /** Charger l'historique depuis localStorage */
  function loadHistory() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        history = JSON.parse(raw);
      }
    } catch (_) {
      history = [];
    }
  }

  /** Défiler vers le bas de la zone de messages */
  function scrollToBottom() {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  /* ─────────── Rendu des messages ─────────── */

  /** Créer le DOM d'un message et l'ajouter à la zone */
  function renderMessage(msg) {
    var wrapper = document.createElement('div');
    var isAI = msg.role === 'ai';
    var isError = msg.role === 'error';

    wrapper.className = 'msg ' + (isError ? 'msg--ai msg--error' : (isAI ? 'msg--ai' : 'msg--user'));

    // Avatar
    var avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    if (isAI || isError) {
      avatar.style.background = 'var(--purple)';
      avatar.textContent = '🧠';
    } else {
      avatar.style.background = 'var(--gold)';
      avatar.style.color = 'var(--dark)';
      avatar.textContent = '👤';
    }

    // Contenu (bulle + horodatage)
    var content = document.createElement('div');

    var bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = msg.text;

    var time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = formatTime(msg.time);

    content.appendChild(bubble);
    content.appendChild(time);

    wrapper.appendChild(avatar);
    wrapper.appendChild(content);

    /* Insérer avant l'indicateur de frappe pour qu'il reste en bas */
    chatMessages.insertBefore(wrapper, typingIndicator);
  }

  /** Rendre tous les messages de l'historique */
  function renderAll() {
    /* Supprimer les messages existants (mais garder l'indicateur de frappe) */
    var children = Array.from(chatMessages.children);
    children.forEach(function (el) {
      if (el !== typingIndicator) chatMessages.removeChild(el);
    });

    history.forEach(renderMessage);
    scrollToBottom();
  }

  /* ─────────── Envoi et réception ─────────── */

  /** Afficher / masquer l'indicateur de frappe */
  function showTyping(show) {
    if (show) {
      typingIndicator.classList.add('visible');
    } else {
      typingIndicator.classList.remove('visible');
    }
    scrollToBottom();
  }

  /** Envoyer un message à l'API et ajouter la réponse */
  async function sendMessage(text) {
    if (isSending) return;

    var trimmed = text.trim();
    if (!trimmed) return;

    isSending = true;
    sendBtn.disabled = true;
    msgInput.value = '';

    /* Masquer les suggestions après le premier envoi */
    suggestionsBar.style.display = 'none';

    /* Ajouter le message utilisateur */
    var userMsg = { role: 'user', text: trimmed, time: Date.now() };
    history.push(userMsg);
    renderMessage(userMsg);
    saveHistory();
    scrollToBottom();

    /* Préparer les 10 derniers messages pour l'API (exclure les erreurs) */
    var recentHistory = history
      .filter(function (m) { return m.role !== 'error'; })
      .slice(-10)
      .map(function (m) {
        return { role: m.role === 'user' ? 'user' : 'assistant', content: m.text };
      });

    showTyping(true);

    try {
      var res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: trimmed, history: recentHistory })
      });

      if (!res.ok) throw new Error('API_UNAVAILABLE');

      var data = await res.json();
      var reply = (data && (data.reply || data.message || data.response)) || 'Désolé, je n\'ai pas pu générer de réponse.';

      var aiMsg = { role: 'ai', text: reply, time: Date.now() };
      history.push(aiMsg);
      renderMessage(aiMsg);
    } catch (err) {
      /* Mode démo : réponse locale quand l'API n'est pas disponible */
      var demoReply = getDemoResponse(trimmed);
      var aiMsg = { role: 'ai', text: '✨ [Mode démo] ' + demoReply, time: Date.now() };
      history.push(aiMsg);
      renderMessage(aiMsg);
    } finally {
      showTyping(false);
      saveHistory();
      isSending = false;
      sendBtn.disabled = false;
      msgInput.focus();
      scrollToBottom();
    }
  }

  /* ─────────── Gestion du dialogue de confirmation ─────────── */

  function showConfirm() {
    confirmOverlay.classList.add('visible');
  }

  function hideConfirm() {
    confirmOverlay.classList.remove('visible');
  }

  /** Vider l'historique et réinitialiser l'interface */
  function clearHistory() {
    history = [Object.assign({}, WELCOME_MSG, { time: Date.now() })];
    try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
    renderAll();
    suggestionsBar.style.display = '';
    hideConfirm();
    updateActivity();
  }

  /* ─────────── Événements ─────────── */

  /* Bouton envoyer */
  sendBtn.addEventListener('click', function () {
    sendMessage(msgInput.value);
  });

  /* Touche Entrée */
  msgInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(msgInput.value);
    }
  });

  /* Suggestions rapides */
  suggestionsBar.addEventListener('click', function (e) {
    if (e.target.classList.contains('chip')) {
      sendMessage(e.target.textContent);
    }
  });

  /* Bouton vider */
  clearBtn.addEventListener('click', showConfirm);
  btnCancel.addEventListener('click', hideConfirm);
  btnConfirm.addEventListener('click', clearHistory);

  /* Fermer le dialogue en cliquant à l'extérieur */
  confirmOverlay.addEventListener('click', function (e) {
    if (e.target === confirmOverlay) hideConfirm();
  });

  /* ─────────── Initialisation ─────────── */

  loadHistory();

  /* Si l'historique est vide, ajouter le message de bienvenue */
  if (history.length === 0) {
    history.push(Object.assign({}, WELCOME_MSG));
    saveHistory();
  }

  renderAll();
  updateActivity();

  /* Vérifier le paramètre ?q= dans l'URL pour envoi automatique */
  var params = new URLSearchParams(window.location.search);
  var autoQ  = params.get('q');
  if (autoQ && autoQ.trim()) {
    /* Petit délai pour laisser le rendu initial se terminer */
    setTimeout(function () {
      sendMessage(autoQ.trim());
    }, 400);
  }
})();
</script>

</body>
</html>
