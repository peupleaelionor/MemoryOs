<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — MemoryOS</title>
  <style>
    /* === Variables globales === */
    :root {
      --gold: #f0a500;
      --gold-light: #ffd166;
      --dark: #0d0d1a;
      --dark2: #13132b;
      --dark3: #1e1e3f;
      --purple: #6c3fc5;
      --purple-light: #8b5cf6;
      --text: #e8e8f0;
      --text-muted: #9090b0;
      --radius: 14px;
    }

    /* === Reset & base === */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }

    /* === En-tête === */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      background: var(--dark2);
      border-bottom: 1px solid var(--dark3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: -0.5px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .header-user {
      font-size: 0.875rem;
      color: var(--text-muted);
      display: none;
    }

    .header-plan {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--purple), var(--purple-light));
      color: #fff;
    }

    .btn-logout {
      font-size: 0.8rem;
      padding: 0.35rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--dark3);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn-logout:hover {
      background: var(--dark3);
      color: var(--text);
    }

    /* === Conteneur principal === */
    .main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 3rem;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--text);
    }

    /* === Cartes statistiques === */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--dark2);
      border: 1px solid var(--dark3);
      border-radius: var(--radius);
      padding: 1.1rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .stat-icon {
      font-size: 1.5rem;
      line-height: 1;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gold);
    }

    .stat-label {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* === Section "Reprendre" === */
    .resume-card {
      background: linear-gradient(135deg, var(--dark2), var(--dark3));
      border: 1px solid var(--dark3);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .resume-card p {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .btn-primary {
      display: inline-block;
      padding: 0.6rem 1.4rem;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--dark);
      font-weight: 700;
      font-size: 0.9rem;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
      text-align: center;
      align-self: flex-start;
    }

    .btn-primary:hover { opacity: 0.85; }

    /* === Grille des modules === */
    .modules-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.65rem;
      margin-bottom: 2rem;
    }

    .module-card {
      background: var(--dark2);
      border: 1px solid var(--dark3);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: border-color 0.2s;
    }

    .module-card:hover {
      border-color: var(--purple);
    }

    .module-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .module-number {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--dark3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--gold);
      flex-shrink: 0;
    }

    .module-title {
      font-size: 0.88rem;
      font-weight: 600;
    }

    .progress-bar-bg {
      width: 100%;
      height: 6px;
      background: var(--dark3);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--purple), var(--purple-light));
      transition: width 0.4s ease;
    }

    .module-percent {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-align: right;
      margin-top: -0.2rem;
    }

    /* === Actions rapides === */
    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .quick-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.85rem 1rem;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
      text-decoration: none;
    }

    .quick-btn:hover { opacity: 0.85; }

    .quick-btn--coach {
      background: linear-gradient(135deg, var(--purple), var(--purple-light));
      color: #fff;
    }

    .quick-btn--quiz {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--dark);
    }

    /* === Responsive tablette / desktop === */
    @media (min-width: 600px) {
      .header { padding: 1rem 2rem; }
      .header-user { display: block; }
      .main { padding: 2rem; }
      .stats-grid { grid-template-columns: repeat(4, 1fr); }
      .modules-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 900px) {
      .modules-grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (min-width: 1100px) {
      .modules-grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>

  <!-- === En-tête === -->
  <header class="header">
    <a href="/" class="header-logo">MemoryOS</a>
    <div class="header-right">
      <span class="header-user" id="headerUser"></span>
      <span class="header-plan" id="headerPlan"></span>
      <button class="btn-logout" id="btnLogout">Déconnexion</button>
    </div>
  </header>

  <!-- === Contenu principal === -->
  <main class="main">

    <!-- Statistiques -->
    <h2 class="section-title">Tes statistiques</h2>
    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-icon">🔥</span>
        <span class="stat-value" id="statStreak">0</span>
        <span class="stat-label">Streak quotidien</span>
      </div>
      <div class="stat-card">
        <span class="stat-icon">📊</span>
        <span class="stat-value" id="statScore">—</span>
        <span class="stat-label">Score moyen</span>
      </div>
      <div class="stat-card">
        <span class="stat-icon">✅</span>
        <span class="stat-value" id="statModules">0/16</span>
        <span class="stat-label">Modules complétés</span>
      </div>
      <div class="stat-card">
        <span class="stat-icon">⏱️</span>
        <span class="stat-value" id="statTime">0 min</span>
        <span class="stat-label">Temps d'entraînement</span>
      </div>
    </div>

    <!-- Reprendre où j'en étais -->
    <h2 class="section-title">Reprendre où j'en étais</h2>
    <div class="resume-card" id="resumeCard">
      <!-- Rempli dynamiquement par JS -->
    </div>

    <!-- Grille des 16 modules -->
    <h2 class="section-title">Modules</h2>
    <div class="modules-grid" id="modulesGrid">
      <!-- Rempli dynamiquement par JS -->
    </div>

    <!-- Actions rapides -->
    <h2 class="section-title">Actions rapides</h2>
    <div class="quick-actions">
      <a href="/pages/chat.html" class="quick-btn quick-btn--coach">💬 Coach IA</a>
      <a href="/pages/quiz.html" class="quick-btn quick-btn--quiz">🧩 Lancer un quiz</a>
    </div>

  </main>

  <script>
    /* ================================================
       Tableau de bord MemoryOS — logique côté client
       Toutes les données proviennent du localStorage
       ================================================ */

    /* --- Liste des 16 modules --- */
    const MODULE_TITLES = [
      'Bases de la mémoire',
      'Répétition espacée',
      'Palais de mémoire',
      'Mnémoniques',
      'Chunking',
      'Sommeil & mémoire',
      'Nutrition & cerveau',
      'Stress & mémoire',
      'Mémoire des noms',
      'Mémoire des chiffres',
      'Mémoire visuelle',
      'Mind mapping',
      'Apprentissage actif',
      'Exercice physique',
      'Techniques avancées',
      "Plan d'entraînement"
    ];

    /* --- Utilitaire : lire une valeur du localStorage --- */
    function ls(key, fallback) {
      try {
        const v = localStorage.getItem(key);
        return v !== null ? v : fallback;
      } catch (_) {
        return fallback;
      }
    }

    /* --- Utilitaire : date au format YYYY-MM-DD locale --- */
    function toDateStr(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + d;
    }

    /* =====================
       Gestion du streak
       ===================== */
    function updateStreak() {
      const today = toDateStr(new Date());
      const lastVisit = ls('memoryos_last_visit', null);
      let streak = parseInt(ls('memoryos_streak', '0'), 10) || 0;

      if (lastVisit === today) {
        /* Déjà visité aujourd'hui, on ne change rien */
      } else {
        /* Calculer la date d'hier */
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yesterdayStr = toDateStr(yesterday);

        if (lastVisit === yesterdayStr) {
          /* Visite hier → on incrémente */
          streak += 1;
        } else {
          /* Pas de visite hier → on repart à 1 */
          streak = 1;
        }
        localStorage.setItem('memoryos_streak', String(streak));
        localStorage.setItem('memoryos_last_visit', today);
      }

      return streak;
    }

    /* =====================
       Calcul du score moyen
       ===================== */
    function computeAverageScore() {
      try {
        const raw = localStorage.getItem('memoryos_quiz_results');
        if (!raw) return '—';
        const results = JSON.parse(raw);
        if (!Array.isArray(results) || results.length === 0) return '—';
        const sum = results.reduce(function (a, b) { return a + Number(b); }, 0);
        return Math.round(sum / results.length) + '%';
      } catch (_) {
        return '—';
      }
    }

    /* =====================
       Remplir l'en-tête
       ===================== */
    function renderHeader() {
      document.getElementById('headerUser').textContent = ls('memoryos_user', 'Utilisateur');
      document.getElementById('headerPlan').textContent = ls('memoryos_plan', 'Starter');
    }

    /* =====================
       Remplir les statistiques
       ===================== */
    function renderStats() {
      document.getElementById('statStreak').textContent = updateStreak();
      document.getElementById('statScore').textContent = computeAverageScore();
      document.getElementById('statModules').textContent = ls('memoryos_modules_completed', '0/16');
      document.getElementById('statTime').textContent = ls('memoryos_training_time', '0 min');
    }

    /* =====================
       Section "Reprendre"
       ===================== */
    function renderResume() {
      var container = document.getElementById('resumeCard');
      var last = ls('memoryos_last_activity', null);
      var parsed = null;

      /* Tenter de parser l'activité stockée */
      if (last) {
        try { parsed = JSON.parse(last); } catch (_) { parsed = null; }
      }

      if (parsed && parsed.title && parsed.url) {
        container.innerHTML =
          '<p>Dernière activité : <strong>' + escapeHtml(parsed.title) + '</strong></p>' +
          '<a href="' + escapeAttr(parsed.url) + '" class="btn-primary">Continuer</a>';
      } else {
        container.innerHTML =
          '<p>Commence ton premier quiz !</p>' +
          '<a href="/pages/quiz.html" class="btn-primary">Commencer</a>';
      }
    }

    /* --- Protection contre l'injection HTML --- */
    function escapeHtml(str) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    function escapeAttr(str) {
      return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    /* =====================
       Grille des 16 modules
       ===================== */
    function renderModules() {
      var grid = document.getElementById('modulesGrid');
      var progressData;

      /* Lire la progression par module (tableau ou objet) */
      try {
        var raw = localStorage.getItem('memoryos_module_progress');
        progressData = raw ? JSON.parse(raw) : null;
      } catch (_) {
        progressData = null;
      }

      var html = '';
      for (var i = 0; i < MODULE_TITLES.length; i++) {
        var pct = 0;
        if (Array.isArray(progressData) && progressData[i] !== undefined) {
          pct = parseInt(progressData[i], 10) || 0;
        } else if (progressData && progressData[String(i)] !== undefined) {
          pct = parseInt(progressData[String(i)], 10) || 0;
        }
        /* Borner entre 0 et 100 */
        pct = Math.max(0, Math.min(100, pct));

        html +=
          '<div class="module-card">' +
            '<div class="module-header">' +
              '<span class="module-number">' + (i + 1) + '</span>' +
              '<span class="module-title">' + escapeHtml(MODULE_TITLES[i]) + '</span>' +
            '</div>' +
            '<div class="progress-bar-bg">' +
              '<div class="progress-bar-fill" style="width:' + pct + '%"></div>' +
            '</div>' +
            '<span class="module-percent">' + pct + ' %</span>' +
          '</div>';
      }
      grid.innerHTML = html;
    }

    /* =====================
       Déconnexion
       ===================== */
    document.getElementById('btnLogout').addEventListener('click', function () {
      localStorage.clear();
      window.location.href = '/';
    });

    /* =====================
       Initialisation au chargement
       ===================== */
    renderHeader();
    renderStats();
    renderResume();
    renderModules();
  </script>
</body>
</html>
