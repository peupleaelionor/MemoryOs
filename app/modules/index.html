      background: var(--dark2); border: 1px solid rgba(255,255,255,0.07);

    .module-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light)); opacity: 0; transition: opacity .2s;

    .module-card:hover::before { opacity: 1; }
    .module-card.completed::before { opacity: 1; background: linear-gradient(90deg, var(--green), #86efac); }

    .mod-num { font-size: 0.75rem; color: var(--gold); font-weight: 700; }

    .detail-back { color: var(--text-muted); cursor: pointer; font-size: 0.9rem; margin-bottom: 1.5rem; display: inline-flex; align-items: center; gap: 0.5rem; }

const completedModules = new Set(
  JSON.parse(localStorage.getItem('memoryos_completed_modules') || '[]')
);

let currentModule = null;
let moduleStartTime = null;

function renderModuleGrid() {
  const grid = document.getElementById('module-grid');
  grid.innerHTML = MODULES.map(m => `
    <div class="module-card ${completedModules.has(m.id) ? 'completed' : ''}" onclick="showModule(${m.id})">
      <div class="mod-header">
        <div class="mod-num">MODULE ${String(m.id).padStart(2,'0')}</div>
        ${completedModules.has(m.id) ? '<div class="mod-done">✓ Complété</div>' : ''}
      </div>
      <div class="mod-title">${m.icon} ${m.title}</div>
      <div class="mod-desc">${m.desc}</div>
      <div class="mod-footer">
        <div class="mod-time">⏱ ~15 min</div>
        <div class="mod-start">${completedModules.has(m.id) ? 'Revoir →' : 'Commencer →'}</div>
      </div>
    </div>
  `).join('');
}

function showModule(id) {
  const mod = MODULES.find(m => m.id === id);
  if (!mod) return;
  currentModule = mod;
  moduleStartTime = Date.now();

  document.getElementById('modules-list').style.display = 'none';
  document.getElementById('module-detail').style.display = 'block';

  document.getElementById('detail-meta').textContent = `MODULE ${String(mod.id).padStart(2,'0')}`;
  document.getElementById('detail-title').textContent = `${mod.icon} ${mod.title}`;
  document.getElementById('detail-content').innerHTML = mod.content;
  document.getElementById('quiz-link').href = `/quiz?module=${mod.id}`;

  const btn = document.getElementById('complete-btn');
  if (completedModules.has(mod.id)) {
    btn.textContent = '✓ Module complété';
    btn.classList.add('done');
  } else {
    btn.textContent = '✓ Marquer comme complété';
    btn.classList.remove('done');
  }

  window.scrollTo(0, 0);

  // Check URL param
  const params = new URLSearchParams(location.search);
  history.pushState({}, '', `/modules?id=${mod.id}`);
}

function showList() {
  document.getElementById('module-detail').style.display = 'none';
  document.getElementById('modules-list').style.display = 'block';
  history.pushState({}, '', '/modules');
}

async function completeModule() {
  if (!currentModule) return;
  const timeSpent = Math.round((Date.now() - moduleStartTime) / 1000);

  completedModules.add(currentModule.id);
  localStorage.setItem('memoryos_completed_modules', JSON.stringify([...completedModules]));

  const btn = document.getElementById('complete-btn');
  btn.textContent = '✓ Module complété';
  btn.classList.add('done');

  renderModuleGrid();

  const userId = localStorage.getItem('memoryos_user_id');
  if (userId) {
    try {
      await fetch('/api/progress', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, moduleId: currentModule.id, timeSpent }),
      });
    } catch { /* silent */ }
  }
}

// Init
const params = new URLSearchParams(location.search);
renderModuleGrid();
if (params.get('id')) {
  const id = parseInt(params.get('id'));
  if (id >= 1 && id <= 16) showModule(id);
}
</script>
